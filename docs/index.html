<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>Report Vendite</title>
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body>

    <button id="refresh-btn" class="refresh-btn" aria-label="Aggiorna report" title="Aggiorna">⟳</button>

    <!-- Schermata di sblocco -->
    <div id="unlock-screen" class="unlock hidden">
        <div class="unlock-card">
            <div class="unlock-logo">🔒</div>
            <h1>Report Vendite</h1>
            <p class="unlock-hint">Inserisci la password per aprire il report.</p>
            <form id="unlock-form">
                <input type="password" id="password-input" inputmode="text"
                       autocomplete="current-password" placeholder="Password"
                       autocapitalize="off" autocorrect="off" required>
                <label class="remember">
                    <input type="checkbox" id="remember-check" checked>
                    Ricorda questo dispositivo
                </label>
                <button type="submit" id="unlock-btn">Sblocca</button>
                <p id="unlock-error" class="unlock-error hidden">
                    Password errata, riprova.
                </p>
            </form>
        </div>
    </div>

    <!-- Caricamento -->
    <div id="loading-screen" class="unlock">
        <div class="unlock-card">
            <div class="spinner"></div>
            <p class="unlock-hint">Caricamento report…</p>
        </div>
    </div>

    <!-- Report -->
    <main id="report" class="hidden">
        <h1 id="month-title" class="month-title"></h1>
        <section id="kpi-row" class="kpi-row"></section>

        <header class="report-header">
            <h2 id="report-title">Vendite di oggi</h2>
            <div class="report-meta">
                <p id="report-date" class="report-date"></p>
                <p id="report-updated" class="report-updated"></p>
            </div>
        </header>
        <section id="category-summary" class="chips-section"></section>
        <section id="pos-summary" class="mini-summary"></section>
        <section id="seller-summary" class="mini-summary"></section>

        <section id="sales-list" class="sales-list"></section>

        <footer class="report-footer">
            <p id="generated-at" class="generated-at"></p>
            <button id="forget-btn" class="forget-btn">Dimentica questo dispositivo</button>
        </footer>
    </main>

    <!-- Grafico mensile (apre cliccando un pannello in alto) -->
    <div id="chart-modal" class="chart-modal hidden">
        <div class="chart-modal-box">
            <div class="chart-modal-head">
                <h3 id="chart-modal-title"></h3>
                <button id="chart-modal-close" class="chart-modal-close"
                        aria-label="Chiudi">✕</button>
            </div>
            <div class="chart-wrap"><canvas id="month-chart"></canvas></div>
        </div>
    </div>

    <script src="vendor/chart.umd.min.js"></script>
    <script src="report.js?v=14"></script>
</body>
</html>
